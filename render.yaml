services:
  - type: web
    name: tutorias-api
    env: node
    region: ohio
    buildCommand: cd backend && npm ci --only=production
    startCommand: node backend/src/app.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tutorias-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 20
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: tutorias-db
    region: ohio
    plan: free
    databaseName: tutorias_db
    ipAllowList: []
